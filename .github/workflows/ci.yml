name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint:all

      - name: Type check
        run: yarn tsc

      - name: Test
        run: yarn test:all

      - name: Build
        run: yarn build:all

      - name: Trigger CD workflow
        uses: peter-evans/workflow-dispatch@v1
        with:
          workflow: CD.yml
          ref: main