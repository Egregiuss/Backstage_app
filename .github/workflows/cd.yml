name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/Backstage_app
            git pull origin main
            corepack enable
            yarn install --immutable
            export APP_BASE_URL='${{ secrets.APP_BASE_URL }}'
            export BACKEND_BASE_URL='${{ secrets.BACKEND_BASE_URL }}'
            if pm2 describe backstage >/dev/null 2>&1; then
              pm2 restart backstage --update-env
            else
              pm2 start "yarn start" --name backstage
            fi