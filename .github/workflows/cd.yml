name: CD

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v4
      
      # Write SSH key from secret to file
      - name: Write SSH key
        shell: bash
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p $HOME/.ssh
          printf '%s\n' "$VM_SSH_KEY" > $HOME/.ssh/vm_deploy_key
          chmod 600 $HOME/.ssh/vm_deploy_key

      # Deploy via SSH
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: $HOME/.ssh/vm_deploy_key
          script: |
            cd ~/Backstage_app
            yarn build
            pm2 restart backstage || pm2 start packages/backend --name backstage