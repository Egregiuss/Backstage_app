name: CD

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Prepare SSH key from secrets
      - name: Setup SSH Key
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$VM_SSH_KEY" > "$HOME/.ssh/vm_deploy_key"
          chmod 600 "$HOME/.ssh/vm_deploy_key"
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}

      # Deploy to the VM
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: $HOME/.ssh/vm_deploy_key
          port: 22
          script: |
            cd ~/Backstage_app
            APP_BASE_URL=${{ secrets.APP_BASE_URL }} BACKEND_BASE_URL=${{ secrets.BACKEND_BASE_URL }} pm2 restart backstage || pm2 start packages/backend --name backstage